[build]
  command = "cp 'BD participantes.xlsx' netlify/functions/ && npm run build"
  # Copy Excel so functions can read it
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/auth/participant"
  to = "/.netlify/functions/auth-participant"
  status = 200

[[redirects]]
  from = "/api/sync-participants"
  to = "/.netlify/functions/sync-participants"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

